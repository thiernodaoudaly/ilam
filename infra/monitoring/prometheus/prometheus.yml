global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: ilam
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: trino
    static_configs:
      - targets: ["trino:8080"]

  - job_name: flink
    static_configs:
      - targets: ["flink-jobmanager:8081"]

  - job_name: airflow
    static_configs:
      - targets: ["airflow-webserver:8080"]
