x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ilam_admin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ilam_password_2025}

services:

  postgres:
    image: postgres:15-alpine
    container_name: ilam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow_password_2025}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ilam-net

  minio:
    image: minio/minio:latest
    container_name: ilam-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ilam_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ilam_password_2025}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ilam-net

  minio-init:
    image: minio/mc:latest
    container_name: ilam-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ilam_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ilam_password_2025}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set ilam http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}
        mc mb --ignore-existing ilam/warehouse
        mc mb --ignore-existing ilam/raw-data
        mc mb --ignore-existing ilam/flink-checkpoints
        mc mb --ignore-existing ilam/ilam-logs
        echo "Buckets initialized successfully"
    networks:
      - ilam-net

  nessie:
    image: projectnessie/nessie:latest
    container_name: ilam-nessie
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: prod
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    ports:
      - "${NESSIE_PORT:-19120}:19120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ilam-net

  trino:
    image: trinodb/trino:435
    container_name: ilam-trino
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog
      - ./infra/trino/config/config.properties:/etc/trino/config.properties
      - ./infra/trino/config/jvm.config:/etc/trino/jvm.config
    ports:
      - "${TRINO_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ilam-net

  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: ilam-flink-jobmanager
    restart: unless-stopped
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        state.backend: rocksdb
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        s3.endpoint: http://minio:9000
        s3.access-key: ${MINIO_ROOT_USER:-ilam_admin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-ilam_password_2025}
        s3.path.style.access: true
    ports:
      - "${FLINK_JOBMANAGER_PORT:-8081}:8081"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ilam-net

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: ilam-flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        state.backend: rocksdb
        state.checkpoints.dir: s3://flink-checkpoints/checkpoints
        s3.endpoint: http://minio:9000
        s3.access-key: ${MINIO_ROOT_USER:-ilam_admin}
        s3.secret-key: ${MINIO_ROOT_PASSWORD:-ilam_password_2025}
        s3.path.style.access: true
    networks:
      - ilam-net

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: ilam-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ilam_admin \
          --password ilam_password_2025 \
          --firstname Ilam \
          --lastname Admin \
          --role Admin \
          --email admin@ilam.io
    networks:
      - ilam-net

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: ilam-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./transform:/opt/airflow/transform
      - airflow_logs:/opt/airflow/logs
    ports:
      - "${AIRFLOW_PORT:-8082}:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - ilam-net

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: ilam-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./transform:/opt/airflow/transform
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    networks:
      - ilam-net

  prometheus:
    image: prom/prometheus:latest
    container_name: ilam-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - ilam-net

  grafana:
    image: grafana/grafana:latest
    container_name: ilam-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ilam_password_2025}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - ilam-net

networks:
  ilam-net:
    name: ilam-network
    driver: bridge

volumes:
  postgres_data:
    name: ilam-postgres-data
  minio_data:
    name: ilam-minio-data
  airflow_logs:
    name: ilam-airflow-logs
  prometheus_data:
    name: ilam-prometheus-data
  grafana_data:
    name: ilam-grafana-data
